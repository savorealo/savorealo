<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 36" width="900" height="36">
  <defs>
    <linearGradient id="line-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0300"  stop-opacity="1"/>
      <stop offset="15%"  stop-color="#FF6B00"  stop-opacity="1"/>
      <stop offset="50%"  stop-color="#FF9A00"  stop-opacity="1"/>
      <stop offset="85%"  stop-color="#FF6B00"  stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0300"  stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="scan-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF9A00" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#FFD080" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#FFD080" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF9A00" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Línea base -->
  <line x1="0" y1="18" x2="900" y2="18" stroke="url(#line-g)" stroke-width="1.2"/>

  <!-- Scanner de luz -->
  <rect x="-100" y="13" width="100" height="10" fill="url(#scan-g)" opacity="0.8">
    <animate attributeName="x" values="-100;900" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Nodo central pulsante -->
  <circle cx="450" cy="18" r="4" fill="#FF8C00">
    <animate attributeName="r"       values="4;6;4"     dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.55;1"  dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Halo del nodo -->
  <circle cx="450" cy="18" r="9" fill="none" stroke="#FF6B00" stroke-width="0.8" opacity="0">
    <animate attributeName="r"       values="6;18;6"    dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Nodos secundarios -->
  <circle cx="180" cy="18" r="2.5" fill="#FF6B00" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.8;0.35" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="18" r="2.5" fill="#FF6B00" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.8;0.35" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <!-- Micro nodos -->
  <circle cx="90"  cy="18" r="1.2" fill="#FF9A00" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.4s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="810" cy="18" r="1.2" fill="#FF9A00" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
</svg>
