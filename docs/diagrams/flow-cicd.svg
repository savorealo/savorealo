<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <linearGradient id="bg-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0300"/>
      <stop offset="100%" stop-color="#180a00"/>
    </linearGradient>
    <linearGradient id="scan-c" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF9A00" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FF9A00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9A00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scan-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#27ae60" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#27ae60" stop-opacity="1"/>
      <stop offset="100%" stop-color="#27ae60" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-c">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="900" height="260" fill="url(#bg-c)" rx="12"/>
  <rect width="900" height="260" fill="none" stroke="#FF6B00" stroke-width="1" rx="12" opacity="0.3"/>

  <!-- Titulo -->
  <text x="450" y="26" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600"
    text-anchor="middle" fill="#FF9A00" letter-spacing="3">CI/CD PIPELINE — GITHUB ACTIONS</text>
  <line x1="180" y1="34" x2="720" y2="34" stroke="#FF6B00" stroke-width="0.5" opacity="0.25"/>

  <!-- ═══ TRIGGER ═══ -->
  <rect x="20" y="50" width="120" height="56" rx="8" fill="#1a0800" stroke="#FF6B00" stroke-width="1"/>
  <text x="80" y="73" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#FF9A00">push / PR</text>
  <text x="80" y="88" font-family="Segoe UI,sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">feat/* develop</text>
  <text x="80" y="100" font-family="Segoe UI,sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">develop main</text>
  <!-- pulso trigger -->
  <rect x="20" y="50" width="120" height="56" rx="8" fill="none" stroke="#FF8C00" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- scanner trigger → GA -->
  <rect x="140" y="72" width="0" height="8" rx="2" fill="url(#scan-c)" opacity="0.8">
    <animate attributeName="width" values="0;60;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x"     values="140;140;200" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ GITHUB ACTIONS ═══ -->
  <rect x="200" y="50" width="120" height="56" rx="8" fill="#1a0800" stroke="#FF6B00" stroke-width="1"/>
  <text x="260" y="73" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#FF9A00">GitHub</text>
  <text x="260" y="87" font-family="Segoe UI,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#FF9A00">Actions</text>
  <text x="260" y="100" font-family="Segoe UI,sans-serif" font-size="8" text-anchor="middle" fill="#ffd4a8" opacity="0.6">orchestrator</text>

  <!-- Linea GA → fork vertical -->
  <line x1="320" y1="78" x2="360" y2="78" stroke="#FF6B00" stroke-width="1" opacity="0.5"/>
  <!-- Linea vertical fork -->
  <line x1="360" y1="106" x2="360" y2="194" stroke="#FF6B00" stroke-width="0.8" opacity="0.35"/>
  <!-- Flechas horizontales a cada job -->
  <line x1="360" y1="106" x2="398" y2="106" stroke="#FF6B00" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="150" x2="398" y2="150" stroke="#FF6B00" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="194" x2="398" y2="194" stroke="#FF6B00" stroke-width="1" opacity="0.5"/>

  <!-- ═══ JOB 1 — LINT + TESTS ═══ -->
  <rect x="400" y="82" width="138" height="48" rx="7" fill="#0a0300" stroke="#FF6B00" stroke-width="0.8"/>
  <text x="469" y="101" font-family="Segoe UI,sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#FF9A00">Lint + Tests</text>
  <text x="469" y="115" font-family="Segoe UI,sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">Vitest · Playwright</text>
  <text x="469" y="126" font-family="Segoe UI,sans-serif" font-size="8" text-anchor="middle" fill="#27ae60" opacity="0.9">~45s</text>
  <!-- barra de progreso job1 -->
  <rect x="412" y="128" width="114" height="2" rx="1" fill="#1a0800"/>
  <rect x="412" y="128" width="0" height="2" rx="1" fill="#FF9A00">
    <animate attributeName="width" values="0;114;0" dur="3s" begin="0.3s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ JOB 2 — ANGULAR BUILD ═══ -->
  <rect x="400" y="126" width="138" height="48" rx="7" fill="#0a0300" stroke="#FF6B00" stroke-width="0.8"/>
  <text x="469" y="145" font-family="Segoe UI,sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#FF9A00">Angular Build</text>
  <text x="469" y="159" font-family="Segoe UI,sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">Cloudflare Pages</text>
  <text x="469" y="170" font-family="Segoe UI,sans-serif" font-size="8" text-anchor="middle" fill="#27ae60" opacity="0.9">~2min</text>
  <!-- barra de progreso job2 -->
  <rect x="412" y="172" width="114" height="2" rx="1" fill="#1a0800"/>
  <rect x="412" y="172" width="0" height="2" rx="1" fill="#FF9A00">
    <animate attributeName="width" values="0;114;0" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ JOB 3 — WORKER BUILD ═══ -->
  <rect x="400" y="170" width="138" height="48" rx="7" fill="#0a0300" stroke="#FF6B00" stroke-width="0.8"/>
  <text x="469" y="189" font-family="Segoe UI,sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#FF9A00">Worker Build</text>
  <text x="469" y="203" font-family="Segoe UI,sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">wrangler deploy</text>
  <text x="469" y="214" font-family="Segoe UI,sans-serif" font-size="8" text-anchor="middle" fill="#27ae60" opacity="0.9">~30s</text>
  <!-- barra de progreso job3 -->
  <rect x="412" y="216" width="114" height="2" rx="1" fill="#1a0800"/>
  <rect x="412" y="216" width="0" height="2" rx="1" fill="#FF9A00">
    <animate attributeName="width" values="0;114;0" dur="3s" begin="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- Lineas merge: jobs → punto central -->
  <line x1="538" y1="106" x2="580" y2="106" stroke="#FF6B00" stroke-width="0.8" opacity="0.35"/>
  <line x1="538" y1="150" x2="580" y2="150" stroke="#FF6B00" stroke-width="0.8" opacity="0.35"/>
  <line x1="538" y1="194" x2="580" y2="194" stroke="#FF6B00" stroke-width="0.8" opacity="0.35"/>
  <line x1="580" y1="106" x2="580" y2="194" stroke="#FF6B00" stroke-width="0.8" opacity="0.3"/>

  <!-- scanner merge → prisma -->
  <rect x="580" y="146" width="0" height="8" rx="2" fill="url(#scan-g)" opacity="0.9">
    <animate attributeName="width" values="0;50;0" dur="3s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="x"     values="580;580;630" dur="3s" begin="1.8s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ PRISMA MIGRATE ═══ -->
  <rect x="632" y="126" width="138" height="48" rx="7" fill="#0a1a0a" stroke="#27ae60" stroke-width="0.8"/>
  <text x="701" y="145" font-family="Segoe UI,sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#7adb8a">Prisma Migrate</text>
  <text x="701" y="159" font-family="Segoe UI,sans-serif" font-size="9" text-anchor="middle" fill="#7adb8a" opacity="0.7">Supabase</text>
  <text x="701" y="170" font-family="Segoe UI,sans-serif" font-size="8" text-anchor="middle" fill="#27ae60" opacity="0.9">~10s</text>
  <!-- barra prisma -->
  <rect x="644" y="172" width="114" height="2" rx="1" fill="#0a2a0a"/>
  <rect x="644" y="172" width="0" height="2" rx="1" fill="#27ae60">
    <animate attributeName="width" values="0;114;0" dur="3s" begin="2.2s" repeatCount="indefinite"/>
  </rect>

  <!-- scanner prisma → deploy -->
  <line x1="770" y1="150" x2="808" y2="150" stroke="#27ae60" stroke-width="1.2" opacity="0.6" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- ═══ DEPLOY ═══ -->
  <rect x="810" y="120" width="76" height="60" rx="8" fill="#0a1a0a" stroke="#27ae60" stroke-width="1.2"/>
  <text x="848" y="143" font-family="Segoe UI,sans-serif" font-size="18" text-anchor="middle" fill="#7adb8a">&#x1F680;</text>
  <text x="848" y="160" font-family="Segoe UI,sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#7adb8a">Deploy</text>
  <text x="848" y="173" font-family="Segoe UI,sans-serif" font-size="8" text-anchor="middle" fill="#7adb8a" opacity="0.7">~3min</text>
  <!-- pulso deploy -->
  <rect x="810" y="120" width="76" height="60" rx="8" fill="none" stroke="#27ae60" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ LEYENDA RAMAS ═══ -->
  <circle cx="168" cy="237" r="5" fill="#e74c3c"/>
  <text x="178" y="241" font-family="Segoe UI,sans-serif" font-size="10" fill="#ffd4a8" opacity="0.7">main produccion</text>
  <circle cx="358" cy="237" r="5" fill="#f1c40f"/>
  <text x="368" y="241" font-family="Segoe UI,sans-serif" font-size="10" fill="#ffd4a8" opacity="0.7">develop staging</text>
  <circle cx="548" cy="237" r="5" fill="#27ae60"/>
  <text x="558" y="241" font-family="Segoe UI,sans-serif" font-size="10" fill="#ffd4a8" opacity="0.7">feat/* local</text>

</svg>
