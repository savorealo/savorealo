<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0300"/>
      <stop offset="100%" stop-color="#180a00"/>
    </linearGradient>
    <linearGradient id="col-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="0.2"/>
      <stop offset="50%"  stop-color="#FF9A00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="arrow-grad-rev" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="0.2"/>
      <stop offset="50%"  stop-color="#FF9A00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1,1 L8,5 L1,9" fill="none" stroke="#FF9A00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-rev" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M9,1 L2,5 L9,9" fill="none" stroke="#FF9A00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="900" height="320" fill="url(#bg)" rx="12"/>
  <rect width="900" height="320" fill="none" stroke="#FF6B00" stroke-width="1" rx="12" opacity="0.3"/>

  <!-- Título -->
  <text x="450" y="32" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="600"
    text-anchor="middle" fill="#FF9A00" letter-spacing="3" opacity="0.9">FLUJO DE GENERACIÓN CON IA</text>
  <line x1="200" y1="42" x2="700" y2="42" stroke="#FF6B00" stroke-width="0.5" opacity="0.3"/>

  <!-- ══ COLUMNA 1 — USUARIO ══ -->
  <rect x="30" y="58" width="220" height="242" rx="10" fill="url(#col-grad)" stroke="#FF6B00" stroke-width="0.8" opacity="0.7"/>
  <text x="140" y="80" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700"
    text-anchor="middle" fill="#FF9A00" letter-spacing="2">👤 USUARIO</text>

  <!-- Pasos usuario -->
  <!-- Step 1 -->
  <rect x="46" y="94" width="188" height="44" rx="7" fill="#1a0800" stroke="#FF6B00" stroke-width="0.6" opacity="0.9"/>
  <text x="140" y="112" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8">🌾 Ingredientes</text>
  <text x="140" y="127" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8" opacity="0.7">+ alergenos + preferencias</text>

  <!-- Step 5 preview -->
  <rect x="46" y="198" width="188" height="44" rx="7" fill="#1a0800" stroke="#FF6B00" stroke-width="0.6" opacity="0.9"/>
  <text x="140" y="216" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8">👁️ Preview receta</text>
  <text x="140" y="231" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8" opacity="0.7">revisa · edita · decide</text>

  <!-- Step 7 publicar -->
  <rect x="46" y="256" width="188" height="36" rx="7" fill="#2a1000" stroke="#FF8C00" stroke-width="1" opacity="0.95">
    <animate attributeName="stroke-opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="140" y="278" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#FF9A00">🚀 Publicar en el feed</text>

  <!-- ══ COLUMNA 2 — API ══ -->
  <rect x="340" y="58" width="220" height="242" rx="10" fill="url(#col-grad)" stroke="#FF6B00" stroke-width="0.8" opacity="0.7"/>
  <text x="450" y="80" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700"
    text-anchor="middle" fill="#FF9A00" letter-spacing="2">⚡ SAVOREALO API</text>

  <!-- Step 2 worker -->
  <rect x="356" y="94" width="188" height="44" rx="7" fill="#1a0800" stroke="#FF6B00" stroke-width="0.6" opacity="0.9"/>
  <text x="450" y="112" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8">🔐 Worker verifica JWT</text>
  <text x="450" y="127" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8" opacity="0.7">construye prompt estructurado</text>

  <!-- Step 4 ai_generations -->
  <rect x="356" y="152" width="188" height="44" rx="7" fill="#1a0800" stroke="#FF6B00" stroke-width="0.6" opacity="0.9"/>
  <text x="450" y="170" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8">🗄️ Guarda en</text>
  <text x="450" y="185" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#FF9A00" font-weight="600">ai_generations · DONE</text>

  <!-- Step 6 crea post -->
  <rect x="356" y="256" width="188" height="36" rx="7" fill="#1a0800" stroke="#FF6B00" stroke-width="0.6" opacity="0.9"/>
  <text x="450" y="270" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8">📝 Crea post tipo RECIPE</text>
  <text x="450" y="284" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8" opacity="0.7">PostgreSQL via Hyperdrive</text>

  <!-- ══ COLUMNA 3 — CLAUDE ══ -->
  <rect x="650" y="58" width="220" height="242" rx="10" fill="url(#col-grad)" stroke="#FF6B00" stroke-width="0.8" opacity="0.7"/>
  <text x="760" y="80" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700"
    text-anchor="middle" fill="#FF9A00" letter-spacing="2">🧠 CLAUDE AI</text>

  <!-- Step 3 claude -->
  <rect x="666" y="94" width="188" height="82" rx="7" fill="#1a0800" stroke="#7c3aed" stroke-width="0.8" opacity="0.9"/>
  <text x="760" y="116" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8">Genera receta JSON:</text>
  <text x="760" y="132" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#FF9A00" opacity="0.9">· pasos detallados</text>
  <text x="760" y="147" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#FF9A00" opacity="0.9">· tiempos estimados</text>
  <text x="760" y="162" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#FF9A00" opacity="0.9">· sustituciones alergenos</text>
  <!-- Pulso morado IA -->
  <rect x="666" y="94" width="188" height="82" rx="7" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.5;3;1.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Foto opcional -->
  <rect x="666" y="198" width="188" height="44" rx="7" fill="#120a20" stroke="#7c3aed" stroke-width="0.6" opacity="0.8"/>
  <text x="760" y="216" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#d4b0ff">📷 Flujo foto</text>
  <text x="760" y="231" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#d4b0ff" opacity="0.7">Vision identifica ingredientes</text>

  <!-- ══ FLECHAS ANIMADAS ══ -->

  <!-- Flecha 1: Usuario → API (ingredientes) -->
  <line x1="234" y1="116" x2="356" y2="116" stroke="url(#arrow-grad)" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle r="4" fill="#FF9A00" opacity="0" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.2s">
      <mpath href="#path-1-2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <path id="path-1-2" d="M234,116 L356,116" fill="none"/>

  <!-- Flecha 2: API → Claude (prompt) -->
  <line x1="544" y1="116" x2="666" y2="116" stroke="url(#arrow-grad)" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle r="4" fill="#FF9A00" opacity="0" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="1s">
      <mpath href="#path-2-3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <path id="path-2-3" d="M544,116 L666,116" fill="none"/>

  <!-- Flecha 3: Claude → API (receta devuelta) -->
  <line x1="666" y1="164" x2="544" y2="164" stroke="url(#arrow-grad-rev)" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle r="4" fill="#FFD080" opacity="0" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="2s">
      <mpath href="#path-3-2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <path id="path-3-2" d="M666,164 L544,164" fill="none"/>

  <!-- Flecha 4: API → Usuario (preview) -->
  <line x1="356" y1="220" x2="234" y2="220" stroke="url(#arrow-grad-rev)" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle r="4" fill="#FFD080" opacity="0" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="2.8s">
      <mpath href="#path-2-1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="2.8s"/>
  </circle>
  <path id="path-2-1" d="M356,220 L234,220" fill="none"/>

  <!-- Flecha 5: Usuario → API (publicar) -->
  <line x1="234" y1="274" x2="356" y2="274" stroke="url(#arrow-grad)" stroke-width="1.8" marker-end="url(#arr)"/>
  <circle r="5" fill="#FF6B00" opacity="0" filter="url(#glow)">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="3.5s">
      <mpath href="#path-1-2b"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite" begin="3.5s"/>
  </circle>
  <path id="path-1-2b" d="M234,274 L356,274" fill="none"/>

  <!-- Labels flechas -->
  <text x="295" y="110" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#FF9A00" opacity="0.7">prompt</text>
  <text x="605" y="110" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#FF9A00" opacity="0.7">Claude API</text>
  <text x="605" y="158" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#FFD080" opacity="0.7">receta JSON</text>
  <text x="295" y="214" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#FFD080" opacity="0.7">preview</text>
  <text x="295" y="268" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#FF9A00" opacity="0.7">publicar</text>

</svg>
